{{define "content"}}
<div class="page-header page-header-row">
  <div>
    <h2>Access Tokens</h2>
    <p class="muted">Create and revoke personal access tokens for Git over HTTP.</p>
  </div>
</div>

<div class="content-grid">
  <section>
    {{template "tokens_panel" .}}
  </section>

  <aside class="form-card side-panel">
    <h3>Generate token</h3>
    <p class="muted">Copy the token after creation. It is shown once and cannot be recovered.</p>
    <form method="POST" action="/tokens" class="form-stack">
      <label class="field">
        <span>Name</span>
        <input id="token-name" type="text" name="name" required placeholder="Work laptop" />
      </label>
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
      <button type="submit">Generate token</button>
    </form>
  </aside>
</div>
{{end}}
