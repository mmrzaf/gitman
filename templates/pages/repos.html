{{define "content"}}
<div class="page-header page-header-row">
  <div>
    <h2>Repositories</h2>
    <p class="muted">Manage Git repositories hosted on this server.</p>
  </div>
</div>

<div class="content-grid">
  <section>
    {{template "repos_panel" .}}
  </section>

  <aside class="form-card side-panel">
    <h3>Create repository</h3>
    <p class="muted">Names may contain letters, numbers, dashes, and underscores.</p>
    <form method="POST" action="/repos" class="form-stack">
      <label class="field">
        <span>Name</span>
        <input id="repo-name" type="text" name="name" required pattern="^[a-zA-Z0-9_-]+$" title="Only letters, numbers, dashes, and underscores." />
      </label>
      <label class="field">
        <span>Description</span>
        <input id="repo-description" type="text" name="description" maxlength="500" />
      </label>
      <label class="checkbox-row">
        <input type="checkbox" name="is_private" checked />
        Private repository
      </label>
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
      <button type="submit">Create repository</button>
    </form>
  </aside>
</div>
{{end}}
