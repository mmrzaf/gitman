{{define "content"}}
<div class="page-header page-header-row">
  <div>
    <h2>SSH Keys</h2>
    <p class="muted">Manage SSH keys allowed to access your repositories.</p>
  </div>
</div>

<div class="content-grid">
  <section>
    {{template "keys_panel" .}}
  </section>

  <aside class="form-card side-panel">
    <h3>Add SSH key</h3>
    <p class="muted">Generate one with <code>ssh-keygen -t ed25519</code>, then paste the public key.</p>
    <form method="POST" action="/keys" hx-post="/keys" hx-target="#keys-panel" hx-swap="outerHTML" class="form-stack">
      <label class="field">
        <span>Name</span>
        <input id="key-name" type="text" name="name" required placeholder="Work laptop" />
      </label>
      <label class="field">
        <span>Public key</span>
        <textarea id="public-key" name="public_key" rows="5" required placeholder="ssh-ed25519 AAAA..."></textarea>
      </label>
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
      <button type="submit">Add SSH key</button>
    </form>
  </aside>
</div>
{{end}}
