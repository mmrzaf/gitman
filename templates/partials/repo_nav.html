{{define "repo_nav"}}
{{if .RepoNav}}
<nav class="repo-nav" aria-label="Repository navigation">
  {{$owner := .RepoNav.Owner.Username}} {{$repo := .RepoNav.Repository.Name}}
  <a href="/{{$owner}}/{{$repo}}/tree{{if .RepoNav.CurrentRef}}?ref={{.RepoNav.CurrentRef}}{{end}}">Files</a>
  <a href="/{{$owner}}/{{$repo}}/commits{{if .RepoNav.CurrentRef}}?ref={{.RepoNav.CurrentRef}}{{end}}">Commits</a>
  {{if .RepoNav.IsOwner}}<a href="/{{$owner}}/{{$repo}}/collaborators">Collaborators</a>{{end}}
  {{if .RepoNav.CanViewCI}}<a href="/{{$owner}}/{{$repo}}/ci">CI/CD</a>{{end}}
  {{if .RepoNav.IsOwner}}<a href="/{{$owner}}/{{$repo}}/ci/secrets">Secrets</a>{{end}}
</nav>
{{end}}
{{end}}
