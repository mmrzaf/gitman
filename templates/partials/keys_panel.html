{{define "keys_panel"}}
<div id="keys-panel">
  {{template "flash" .}}

  {{if .Data.Keys}}
  <div class="resource-list">
    {{range .Data.Keys}}
    <article class="resource-row">
      <div class="resource-main">
        <div class="resource-title"><strong>{{.Name}}</strong></div>
        <div class="resource-meta"><code>{{slice .PublicKey 0 60}}...</code></div>
      </div>
      <div class="resource-actions">
        <form method="POST" action="/keys/{{.ID}}/delete" data-confirm="Delete SSH key {{.Name}}?">
          <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}" />
          <button type="submit" class="danger small">Delete</button>
        </form>
      </div>
    </article>
    {{end}}
  </div>
  {{else}}
  <div class="empty-state">
    <p>No SSH keys yet.</p>
    <p class="muted">Add a key to push and pull repositories over SSH.</p>
  </div>
  {{end}}
</div>
{{end}}
