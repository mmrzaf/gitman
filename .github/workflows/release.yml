name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

defaults:
  run:
    shell: bash

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        run: |
          set -euo pipefail

          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $GITHUB_REF_NAME"
            echo "Expected format: v1.2.3 or v1.2.3-beta.4"
            exit 1
          fi

      - name: Check formatting
        run: |
          set -euo pipefail

          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "The following files require gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -trimpath -o /tmp/gitman ./cmd/gitman

  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} binary
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          mkdir -p dist

          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "dist/gitman_${GOOS}_${GOARCH}${{ matrix.ext }}" \
            ./cmd/gitman

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gitman_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  build-docker:
    name: Build Docker image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image tarball
        env:
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${IMAGE_VERSION}"
          TARBALL="gitman-docker-image-${GITHUB_REF_NAME}-linux-amd64.tar.gz"

          docker pull "$IMAGE_REF"
          docker save "$IMAGE_REF" | gzip -9 > "$TARBALL"

          ls -lh "$TARBALL"

      - name: Upload Docker image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-tarball
          path: gitman-docker-image-${{ github.ref_name }}-linux-amd64.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs:
      - build-binaries
      - build-docker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail

          cd release

          find . \
            -maxdepth 1 \
            -type f \
            ! -name SHA256SUMS \
            -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum \
            > SHA256SUMS

          ls -lah
          echo
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          args=(
            --verify-tag
            --generate-notes
            --fail-on-no-commits
            --title "$GITHUB_REF_NAME"
          )

          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            args+=(
              --prerelease
              --latest=false
            )
          fi

          gh release create \
            "$GITHUB_REF_NAME" \
            release/* \
            "${args[@]}"
