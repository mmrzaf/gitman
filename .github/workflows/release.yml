name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to publish, for example v1.0.0-beta.14'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  APP_NAME: gitman
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: 'v2.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_IMAGE: golang:1.26-bookworm
  RUNTIME_IMAGE: debian:bookworm-slim
  DEBIAN_MIRROR: http://linux-mirror.liara.ir/repository/debian
  DEBIAN_SECURITY_MIRROR: http://linux-mirror.liara.ir/repository/debian-security
  GOPROXY: https://mirror.abrha.net/repository/go/,direct

jobs:
  release-metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      clean_version: ${{ steps.meta.outputs.clean_version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Validate release version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must look like v1.2.3 or v1.2.3-beta.12: $version" >&2
            exit 1
          fi

          clean_version="${version#v}"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "version=$version"
            echo "clean_version=$clean_version"
            echo "prerelease=$prerelease"
          } >>"$GITHUB_OUTPUT"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: release-metadata
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-metadata.outputs.version }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          go version
          goversion="$(go env GOVERSION)"
          case "$goversion" in
            "go${GO_VERSION}"|"go${GO_VERSION}."*) ;;
            *) echo "Expected Go ${GO_VERSION}.x, got ${goversion}" >&2; exit 1 ;;
          esac

      - name: Download modules
        run: go mod download

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l $(git ls-files '*.go'))"
          if [[ -n "$files" ]]; then
            echo "Go files need formatting:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build smoke binary
        shell: bash
        env:
          VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p bin
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o bin/gitman ./cmd/gitman
          test "$(bin/gitman version)" = "$VERSION"
          test "$(bin/gitman --version)" = "$VERSION"

      - name: Docker smoke build
        shell: bash
        env:
          VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg GO_IMAGE="$GO_IMAGE" \
            --build-arg RUNTIME_IMAGE="$RUNTIME_IMAGE" \
            --build-arg DEBIAN_MIRROR="$DEBIAN_MIRROR" \
            --build-arg DEBIAN_SECURITY_MIRROR="$DEBIAN_SECURITY_MIRROR" \
            --build-arg GOPROXY="$GOPROXY" \
            --build-arg VERSION="$VERSION" \
            -t gitman:verify .
          test "$(docker run --rm gitman:verify gitman version)" = "$VERSION"

  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [release-metadata, verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-metadata.outputs.version }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        shell: bash
        env:
          VERSION: ${{ needs.release-metadata.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/${APP_NAME}_${GOOS}_${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" ./cmd/gitman
          sha256sum "$out" >"$out.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  source-archive:
    name: Build source archive
    runs-on: ubuntu-latest
    needs: [release-metadata, verify]
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-metadata.outputs.version }}
          fetch-depth: 0

      - name: Build tracked-files-only source archive
        shell: bash
        env:
          VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          make release-source
          tar -tzf "dist/gitman-${VERSION#v}.tar.gz" | sort

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-archive
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  docker-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [release-metadata, verify]
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-metadata.outputs.version }}
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-metadata.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-metadata.outputs.version }},enable=${{ needs.release-metadata.outputs.prerelease == 'false' }}
            type=raw,value=latest,enable=${{ needs.release-metadata.outputs.prerelease == 'false' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_IMAGE=${{ env.GO_IMAGE }}
            RUNTIME_IMAGE=${{ env.RUNTIME_IMAGE }}
            DEBIAN_MIRROR=${{ env.DEBIAN_MIRROR }}
            DEBIAN_SECURITY_MIRROR=${{ env.DEBIAN_SECURITY_MIRROR }}
            GOPROXY=${{ env.GOPROXY }}
            VERSION=${{ needs.release-metadata.outputs.version }}

  docker-archive:
    name: Build Docker archive
    runs-on: ubuntu-latest
    needs: [release-metadata, verify]
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-metadata.outputs.version }}
          fetch-depth: 0

      - name: Build linux/amd64 Docker tarball
        shell: bash
        env:
          VERSION: ${{ needs.release-metadata.outputs.version }}
          CLEAN_VERSION: ${{ needs.release-metadata.outputs.clean_version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          image="gitman:${CLEAN_VERSION}"
          docker build --platform linux/amd64 \
            --build-arg GO_IMAGE="$GO_IMAGE" \
            --build-arg RUNTIME_IMAGE="$RUNTIME_IMAGE" \
            --build-arg DEBIAN_MIRROR="$DEBIAN_MIRROR" \
            --build-arg DEBIAN_SECURITY_MIRROR="$DEBIAN_SECURITY_MIRROR" \
            --build-arg GOPROXY="$GOPROXY" \
            --build-arg VERSION="$VERSION" \
            -t "$image" .
          test "$(docker run --rm "$image" gitman version)" = "$VERSION"
          docker save "$image" | gzip -9 >"dist/gitman-docker-image-linux-amd64-${CLEAN_VERSION}.tar.gz"
          sha256sum "dist/gitman-docker-image-linux-amd64-${CLEAN_VERSION}.tar.gz" >"dist/gitman-docker-image-linux-amd64-${CLEAN_VERSION}.tar.gz.sha256"

      - name: Upload Docker archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-archive
          path: dist/*
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [release-metadata, build-binaries, source-archive, docker-image, docker-archive]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Create aggregate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum * | sort -k2 > SHA256SUMS
          ls -la

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-metadata.outputs.version }}
          name: Gitman ${{ needs.release-metadata.outputs.version }}
          prerelease: ${{ needs.release-metadata.outputs.prerelease }}
          generate_release_notes: true
          files: release/*
