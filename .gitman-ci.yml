image: gitman-ci-go:1.24-alpine

env:
  GOMODCACHE: /gitman/cache/go/pkg/mod
  GOCACHE: /gitman/cache/go/build
  CGO_ENABLED: "0"
  GOFLAGS: "-mod=mod"
  GOPROXY: https://mirror.abrha.net/repository/go/,direct
  GOTMPDIR: /gitman/cache/go/tmp

steps:
  - name: prepare cache
    run: |
      mkdir -p "$GOMODCACHE" "$GOCACHE" "$GOTMPDIR"
      echo "Module cache: $GOMODCACHE"
      echo "Build cache: $GOCACHE"

  - name: test
    run: go test ./...

  - name: build
    run: go build ./cmd/gitman
