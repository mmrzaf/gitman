image: docker:29-cli

docker: true

env:
  IMAGE_NAME: gitman
  DOCKER_BUILDKIT: "1"

steps:
  - name: verify docker access
    run: |
      set -eu
      docker version

  - name: resolve image tag
    run: |
      set -eu

      REF_KIND="commit"
      RAW_IMAGE_TAG="$GITMAN_COMMIT"

      if [ -n "${GITMAN_TAG:-}" ]; then
        REF_KIND="tag"
        RAW_IMAGE_TAG="$GITMAN_TAG"
      fi

      IMAGE_TAG="$(printf '%s' "$RAW_IMAGE_TAG" \
        | sed 's/[^A-Za-z0-9_.-]/-/g' \
        | sed 's/^[.-]*//' \
        | sed 's/[.-]*$//' \
        | cut -c1-128)"

      if [ -z "$IMAGE_TAG" ]; then
        IMAGE_TAG="$GITMAN_COMMIT"
      fi

      cat > .gitman-image.env <<EOF_TAG
      REF_KIND=$REF_KIND
      RAW_IMAGE_TAG=$RAW_IMAGE_TAG
      IMAGE_TAG=$IMAGE_TAG
      IMAGE_REF=$IMAGE_NAME:$IMAGE_TAG
      EOF_TAG

      cat .gitman-image.env

  - name: build docker image
    run: |
      set -eu
      . ./.gitman-image.env

      docker build \
        --pull=false \
        --build-arg VERSION="$IMAGE_TAG" \
        --label "org.opencontainers.image.revision=$GITMAN_COMMIT" \
        --label "org.opencontainers.image.ref.name=$RAW_IMAGE_TAG" \
        --label "org.opencontainers.image.version=$IMAGE_TAG" \
        --tag "$IMAGE_REF" \
        .

  - name: verify built image
    run: |
      set -eu
      . ./.gitman-image.env

      docker image inspect "$IMAGE_REF" >/dev/null
      docker run --rm "$IMAGE_REF" gitman version
